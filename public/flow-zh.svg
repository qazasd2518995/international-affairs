<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2400" font-family="'Microsoft JhengHei', 'PingFang TC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12102b"/>
      <stop offset="50%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 L0 0 L0 32" fill="none" stroke="#9d00ff" stroke-width="1" opacity="0.08"/>
    </pattern>

    <filter id="glow-yellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffcc00"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1600" height="2400" fill="url(#bg)"/>
  <rect width="1600" height="2400" fill="url(#grid)"/>

  <!-- 標題 -->
  <g transform="translate(800, 80)">
    <text x="0" y="0" font-size="48" fill="#ff00aa" text-anchor="middle" filter="url(#glow-pink)" font-weight="bold">迷你辯論競技場</text>
    <text x="0" y="60" font-size="22" fill="#ffcc00" text-anchor="middle" filter="url(#glow-yellow)">MINI DEBATE ARENA</text>
    <text x="0" y="100" font-size="14" fill="#00fff0" text-anchor="middle" letter-spacing="6">「 活 動 流 程 」</text>
  </g>

  <!-- 總時間標籤 -->
  <g transform="translate(800, 220)">
    <rect x="-180" y="-25" width="360" height="40" fill="#0a0a2e" stroke="#39ff14" stroke-width="2"/>
    <text x="0" y="4" font-size="16" fill="#39ff14" text-anchor="middle" font-weight="bold">總時長：約 15 分鐘</text>
  </g>

  <!-- ===== 步驟 1: 開場 ===== -->
  <g transform="translate(100, 280)">
    <rect x="0" y="0" width="1400" height="180" fill="#0f0f1e" stroke="#ffcc00" stroke-width="3"/>
    <rect x="-6" y="-6" width="1412" height="192" fill="none" stroke="#ffcc00" stroke-width="2"/>
    <circle cx="60" cy="60" r="28" fill="#ffcc00"/>
    <text x="60" y="68" font-size="22" fill="#0a0a2e" text-anchor="middle" font-weight="bold">1</text>
    <text x="120" y="50" font-size="22" fill="#ffcc00" filter="url(#glow-yellow)" font-weight="bold">開場 ‧ 集合</text>
    <text x="120" y="80" font-size="14" fill="#39ff14">約 2 分鐘</text>

    <text x="120" y="120" font-size="15" fill="#ffffff">► 主持人開啟 /admin 並按下「開始新遊戲」</text>
    <text x="120" y="143" font-size="15" fill="#ffffff">► 大螢幕投影出 QR Code</text>
    <text x="120" y="166" font-size="15" fill="#ffffff">► 學生手機掃描 QR、輸入名字、選擇 6 組之一</text>

    <!-- QR 圖示 -->
    <g transform="translate(1200, 90)">
      <rect x="-50" y="-50" width="100" height="100" fill="#ffffff"/>
      <rect x="-40" y="-40" width="20" height="20" fill="#0a0a2e"/>
      <rect x="20" y="-40" width="20" height="20" fill="#0a0a2e"/>
      <rect x="-40" y="20" width="20" height="20" fill="#0a0a2e"/>
      <rect x="-10" y="-10" width="20" height="20" fill="#0a0a2e"/>
      <rect x="20" y="20" width="20" height="20" fill="#0a0a2e"/>
      <text x="0" y="80" font-size="13" fill="#ffcc00" text-anchor="middle">掃 QR 加入</text>
    </g>
  </g>
  <line x1="800" y1="460" x2="800" y2="500" stroke="#ffcc00" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ===== 步驟 2: 自動配對 ===== -->
  <g transform="translate(100, 510)">
    <rect x="0" y="0" width="1400" height="160" fill="#0f0f1e" stroke="#ff00aa" stroke-width="3"/>
    <rect x="-6" y="-6" width="1412" height="172" fill="none" stroke="#ff00aa" stroke-width="2"/>
    <circle cx="60" cy="60" r="28" fill="#ff00aa"/>
    <text x="60" y="68" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">2</text>
    <text x="120" y="50" font-size="22" fill="#ff00aa" filter="url(#glow-pink)" font-weight="bold">自動配對 ‧ 分派立場</text>
    <text x="120" y="80" font-size="14" fill="#39ff14">約 5 秒</text>

    <text x="120" y="115" font-size="15" fill="#ffffff">► 系統隨機把 6 組配成 3 組對戰</text>
    <text x="120" y="138" font-size="15" fill="#ffffff">► 擲銅板決定誰是「正方」誰是「反方」 — 完全公平</text>

    <!-- 3 組對戰圖示 -->
    <g transform="translate(1180, 80)" font-size="13" fill="#ffffff">
      <rect x="-100" y="-50" width="200" height="100" fill="none" stroke="#ff00aa" stroke-width="2"/>
      <text x="-70" y="-25" fill="#ff0040">2組</text>
      <text x="-30" y="-25" fill="#ffcc00">VS</text>
      <text x="20" y="-25" fill="#0080ff">3組</text>
      <text x="-70" y="0" fill="#ff0040">4組</text>
      <text x="-30" y="0" fill="#ffcc00">VS</text>
      <text x="20" y="0" fill="#0080ff">5組</text>
      <text x="-70" y="25" fill="#ff0040">1組</text>
      <text x="-30" y="25" fill="#ffcc00">VS</text>
      <text x="20" y="25" fill="#0080ff">6組</text>
    </g>
  </g>
  <line x1="800" y1="670" x2="800" y2="710" stroke="#ffcc00" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 重複循環橫幅 -->
  <g transform="translate(800, 730)">
    <rect x="-340" y="0" width="680" height="40" fill="#1a0033" stroke="#39ff14" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="0" y="27" font-size="16" fill="#39ff14" text-anchor="middle" font-weight="bold">↓ 重複 3 次（每場對戰跑一次完整流程）↓</text>
  </g>

  <!-- ===== 步驟 3: 抽題 ===== -->
  <g transform="translate(100, 800)">
    <rect x="0" y="0" width="1400" height="160" fill="#0f0f1e" stroke="#ffcc00" stroke-width="3"/>
    <rect x="-6" y="-6" width="1412" height="172" fill="none" stroke="#ffcc00" stroke-width="2"/>
    <circle cx="60" cy="60" r="28" fill="#ffcc00"/>
    <text x="60" y="68" font-size="22" fill="#0a0a2e" text-anchor="middle" font-weight="bold">3</text>
    <text x="120" y="50" font-size="22" fill="#ffcc00" filter="url(#glow-yellow)" font-weight="bold">抽題目</text>
    <text x="120" y="80" font-size="14" fill="#39ff14">約 30 秒</text>

    <text x="120" y="115" font-size="15" fill="#ffffff">► 主持人按下「抽題」 — 3-2-1 倒數，接著洗牌動畫</text>
    <text x="120" y="138" font-size="15" fill="#ffffff">► 從 12 題題庫中隨機抽出，附帶「★ 難度」標示</text>

    <!-- 骰子圖示 -->
    <g transform="translate(1180, 80)">
      <rect x="-40" y="-40" width="80" height="80" fill="#ffcc00" stroke="#0a0a2e" stroke-width="3"/>
      <circle cx="-20" cy="-20" r="6" fill="#0a0a2e"/>
      <circle cx="20" cy="-20" r="6" fill="#0a0a2e"/>
      <circle cx="0" cy="0" r="6" fill="#0a0a2e"/>
      <circle cx="-20" cy="20" r="6" fill="#0a0a2e"/>
      <circle cx="20" cy="20" r="6" fill="#0a0a2e"/>
      <text x="0" y="68" font-size="13" fill="#ffcc00" text-anchor="middle">隨機抽題</text>
    </g>
  </g>
  <line x1="800" y1="960" x2="800" y2="1000" stroke="#ffcc00" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ===== 步驟 4: 揭曉對戰 ===== -->
  <g transform="translate(100, 1010)">
    <rect x="0" y="0" width="1400" height="140" fill="#0f0f1e" stroke="#ff00aa" stroke-width="3"/>
    <rect x="-6" y="-6" width="1412" height="152" fill="none" stroke="#ff00aa" stroke-width="2"/>
    <circle cx="60" cy="60" r="28" fill="#ff00aa"/>
    <text x="60" y="68" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">4</text>
    <text x="120" y="50" font-size="22" fill="#ff00aa" filter="url(#glow-pink)" font-weight="bold">揭曉對戰組別</text>
    <text x="120" y="80" font-size="14" fill="#39ff14">約 15 秒</text>

    <text x="120" y="115" font-size="15" fill="#ffffff">► 第 1 場：揭曉全部 3 對 ‧ 第 2、3 場：只揭曉本場上場的這對</text>

    <!-- VS 圖示 -->
    <g transform="translate(1180, 70)">
      <rect x="-90" y="-30" width="60" height="60" fill="#ff0040" stroke="#ffffff" stroke-width="2"/>
      <text x="-60" y="5" font-size="14" fill="#ffffff" text-anchor="middle">A 隊</text>
      <text x="0" y="10" font-size="20" fill="#ffcc00" text-anchor="middle" filter="url(#glow-yellow)">VS</text>
      <rect x="30" y="-30" width="60" height="60" fill="#0080ff" stroke="#ffffff" stroke-width="2"/>
      <text x="60" y="5" font-size="14" fill="#ffffff" text-anchor="middle">B 隊</text>
    </g>
  </g>
  <line x1="800" y1="1150" x2="800" y2="1190" stroke="#ffcc00" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ===== 步驟 5: 準備 ===== -->
  <g transform="translate(100, 1200)">
    <rect x="0" y="0" width="1400" height="200" fill="#0f0f1e" stroke="#39ff14" stroke-width="3"/>
    <rect x="-6" y="-6" width="1412" height="212" fill="none" stroke="#39ff14" stroke-width="2"/>
    <circle cx="60" cy="60" r="28" fill="#39ff14"/>
    <text x="60" y="68" font-size="22" fill="#0a0a2e" text-anchor="middle" font-weight="bold">5</text>
    <text x="120" y="50" font-size="22" fill="#39ff14" filter="url(#glow-green)" font-weight="bold">準備時間</text>
    <text x="120" y="80" font-size="14" fill="#39ff14">90 秒</text>

    <text x="120" y="115" font-size="15" fill="#ffffff">► 上場兩隊用手機輸入辯論論點</text>
    <text x="120" y="138" font-size="15" fill="#ffffff">► 隊員可以多人輸入 — 所有論點會累積、不會互相覆蓋</text>
    <text x="120" y="161" font-size="15" fill="#ffffff">► 投影螢幕和其他學生的手機都看得到即時論點 feed</text>
    <text x="120" y="184" font-size="15" fill="#00fff0">► 倒數結束時，AI 評審會分析「整隊」所有論點</text>

    <!-- 對話框圖示 -->
    <g transform="translate(1180, 100)">
      <rect x="-80" y="-50" width="160" height="100" fill="#0a0a2e" stroke="#39ff14" stroke-width="2"/>
      <text x="-68" y="-25" font-size="11" fill="#00fff0">玩家1: 資料外洩</text>
      <text x="-68" y="-5" font-size="11" fill="#00fff0">玩家2: 言論審查</text>
      <text x="-68" y="15" font-size="11" fill="#00fff0">玩家3: 注意力差</text>
      <text x="-68" y="35" font-size="11" fill="#39ff14">▌</text>
    </g>
  </g>
  <line x1="800" y1="1400" x2="800" y2="1440" stroke="#ffcc00" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ===== 步驟 6: 自由辯論 ===== -->
  <g transform="translate(100, 1450)">
    <rect x="0" y="0" width="1400" height="160" fill="#0f0f1e" stroke="#ff0040" stroke-width="3"/>
    <rect x="-6" y="-6" width="1412" height="172" fill="none" stroke="#ff0040" stroke-width="2"/>
    <circle cx="60" cy="60" r="28" fill="#ff0040"/>
    <text x="60" y="68" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">6</text>
    <text x="120" y="50" font-size="22" fill="#ff0040" filter="url(#glow-pink)" font-weight="bold">自由辯論</text>
    <text x="120" y="80" font-size="14" fill="#39ff14">120 秒（2 分鐘）</text>

    <text x="120" y="115" font-size="15" fill="#ffffff">► 兩隊上台，用嘴巴針對題目辯論</text>
    <text x="120" y="138" font-size="15" fill="#ffffff">► 單一 2 分鐘倒數 ‧ 自由形式，沒有強制發言順序</text>

    <!-- 麥克風圖示 -->
    <g transform="translate(1180, 80)">
      <rect x="-15" y="-40" width="30" height="40" fill="#ff0040" stroke="#ffffff" stroke-width="2"/>
      <line x1="0" y1="0" x2="0" y2="20" stroke="#ffffff" stroke-width="3"/>
      <line x1="-20" y1="20" x2="20" y2="20" stroke="#ffffff" stroke-width="3"/>
      <text x="0" y="50" font-size="13" fill="#ff0040" text-anchor="middle">開講！</text>
    </g>
  </g>
  <line x1="800" y1="1610" x2="800" y2="1650" stroke="#ffcc00" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ===== 步驟 7: 觀眾投票 ===== -->
  <g transform="translate(100, 1660)">
    <rect x="0" y="0" width="1400" height="140" fill="#0f0f1e" stroke="#ffcc00" stroke-width="3"/>
    <rect x="-6" y="-6" width="1412" height="152" fill="none" stroke="#ffcc00" stroke-width="2"/>
    <circle cx="60" cy="60" r="28" fill="#ffcc00"/>
    <text x="60" y="68" font-size="22" fill="#0a0a2e" text-anchor="middle" font-weight="bold">7</text>
    <text x="120" y="50" font-size="22" fill="#ffcc00" filter="url(#glow-yellow)" font-weight="bold">觀眾投票</text>
    <text x="120" y="80" font-size="14" fill="#39ff14">20 秒</text>

    <text x="120" y="115" font-size="15" fill="#ffffff">► 沒上場的 4 組投票選出他們覺得贏的隊伍 — 占最終分數 30%</text>

    <!-- 投票條圖示 -->
    <g transform="translate(1180, 75)">
      <rect x="-80" y="-15" width="60" height="30" fill="#ff0040"/>
      <rect x="-20" y="-15" width="100" height="30" fill="#0080ff"/>
      <text x="-50" y="40" font-size="11" fill="#ff0040" text-anchor="middle">A 38%</text>
      <text x="30" y="40" font-size="11" fill="#0080ff" text-anchor="middle">B 62%</text>
    </g>
  </g>
  <line x1="800" y1="1800" x2="800" y2="1840" stroke="#ffcc00" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ===== 步驟 8: 評審評分 ===== -->
  <g transform="translate(100, 1850)">
    <rect x="0" y="0" width="1400" height="180" fill="#0f0f1e" stroke="#ffcc00" stroke-width="3"/>
    <rect x="-6" y="-6" width="1412" height="192" fill="none" stroke="#ffcc00" stroke-width="2"/>
    <circle cx="60" cy="60" r="28" fill="#ffcc00"/>
    <text x="60" y="68" font-size="22" fill="#0a0a2e" text-anchor="middle" font-weight="bold">8</text>
    <text x="120" y="50" font-size="22" fill="#ffcc00" filter="url(#glow-yellow)" font-weight="bold">評審評分</text>
    <text x="120" y="80" font-size="14" fill="#39ff14">約 30 秒</text>

    <text x="120" y="115" font-size="15" fill="#ffffff">► 兩位評審用手機分別給每隊 1 - 10 分</text>
    <text x="120" y="138" font-size="15" fill="#ffffff">► AI 評語會私下顯示給評審看（不會出現在投影螢幕上）</text>
    <text x="120" y="161" font-size="15" fill="#00fff0">► 最終分數 ＝（評審平均 × 70%）＋（觀眾投票 × 30%）</text>

    <!-- 天秤圖示 -->
    <g transform="translate(1180, 95)">
      <line x1="0" y1="-30" x2="0" y2="30" stroke="#ffcc00" stroke-width="3"/>
      <line x1="-50" y1="-15" x2="50" y2="-15" stroke="#ffcc00" stroke-width="3"/>
      <circle cx="-50" cy="0" r="15" fill="none" stroke="#ff0040" stroke-width="2"/>
      <circle cx="50" cy="0" r="15" fill="none" stroke="#0080ff" stroke-width="2"/>
      <text x="0" y="55" font-size="13" fill="#ffcc00" text-anchor="middle">評審</text>
    </g>
  </g>
  <line x1="800" y1="2030" x2="800" y2="2070" stroke="#ffcc00" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ===== 步驟 9: 結果揭曉 ===== -->
  <g transform="translate(100, 2080)">
    <rect x="0" y="0" width="1400" height="140" fill="#0f0f1e" stroke="#ff00aa" stroke-width="3"/>
    <rect x="-6" y="-6" width="1412" height="152" fill="none" stroke="#ff00aa" stroke-width="2"/>
    <circle cx="60" cy="60" r="28" fill="#ff00aa"/>
    <text x="60" y="68" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">9</text>
    <text x="120" y="50" font-size="22" fill="#ff00aa" filter="url(#glow-pink)" font-weight="bold">本場結果揭曉</text>
    <text x="120" y="80" font-size="14" fill="#39ff14">約 15 秒</text>

    <text x="120" y="115" font-size="15" fill="#ffffff">► 揭曉本場勝隊 ‧ 彩帶動畫 ‧ 兩隊分數細節同時顯示</text>

    <!-- 王冠圖示 -->
    <g transform="translate(1180, 70)">
      <polygon points="-30,15 -20,-15 -10,5 0,-25 10,5 20,-15 30,15" fill="#ffcc00" filter="url(#glow-yellow)"/>
      <rect x="-30" y="15" width="60" height="10" fill="#ffcc00"/>
      <text x="0" y="50" font-size="13" fill="#ffcc00" text-anchor="middle">勝者</text>
    </g>
  </g>

  <!-- 循環箭頭：回到步驟 3 -->
  <g>
    <path d="M 80 2150 L 30 2150 L 30 870 L 100 870" fill="none" stroke="#39ff14" stroke-width="3" stroke-dasharray="8 4" marker-end="url(#arrow)"/>
    <text x="20" y="1500" font-size="13" fill="#39ff14" transform="rotate(-90, 20, 1500)" text-anchor="middle" font-weight="bold">回到步驟 3 開始下一場</text>
  </g>

  <!-- 跑完三場後的箭頭 -->
  <line x1="800" y1="2220" x2="800" y2="2260" stroke="#ffcc00" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ===== 步驟 10: 加冕冠軍 ===== -->
  <g transform="translate(100, 2270)">
    <rect x="0" y="0" width="1400" height="120" fill="#0f0f1e" stroke="#ffcc00" stroke-width="3"/>
    <rect x="-6" y="-6" width="1412" height="132" fill="none" stroke="#ffcc00" stroke-width="2"/>
    <circle cx="60" cy="60" r="28" fill="#ffcc00"/>
    <text x="60" y="63" font-size="20" fill="#0a0a2e" text-anchor="middle" font-weight="bold">10</text>
    <text x="120" y="50" font-size="22" fill="#ffcc00" filter="url(#glow-yellow)" font-weight="bold">加冕總冠軍</text>
    <text x="120" y="80" font-size="14" fill="#39ff14">約 1 分鐘</text>
    <text x="120" y="105" font-size="15" fill="#ffffff">► 排行榜揭曉 ‧ 三場累計 XP 最高的隊伍奪冠</text>

    <!-- 王冠 -->
    <g transform="translate(1180, 60)">
      <text x="0" y="20" font-size="60" fill="#ffcc00" text-anchor="middle" filter="url(#glow-yellow)">♛</text>
    </g>
  </g>
</svg>
